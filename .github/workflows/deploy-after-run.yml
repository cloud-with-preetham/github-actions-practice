name: Deploy After Tests

on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy
        run: echo "Tests passed. Deploying application..."

      - name: Handle Failure
        if: github.event.workflow_run.conclusion != 'success'
        run: echo "Tests failed. Deployment stopped."
