name: My Secrets Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  secrets-check:
    runs-on: ubuntu-latest
    steps:
      # Task 1
      - name: Check if secrets exists
        env:
          MY_SECRET_MESSAGE: ${{ secrets.MY_SECRET_MESSAGE }}
        run: |
          if [ -n "MY_SECRET_MESSAGE" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is set: false"
            exit 1
          fi

      - name: GitHub secret masking behaviour
        env:
          MY_SECRET_MESSAGE: ${{ secrets.MY_SECRET_MESSAGE }}
        run: |
          echo "If printed, GitHub masks the secret value in logs:"
          echo "$MY_SECRET_MESSAGE"

      # Task 2
      - name: Docker credentials in environment variables
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          test -n "$DOCKER_USERNAME" && echo "DOCKER_USERNAME is configured"
          test -n "DOCKER_TOKEN" && echo "DOCKER_TOKEN is configured"
